<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartenschach – Handy-Ansicht (9:16)</title>
<style>
  html,body{height:100%;margin:0}
  body{
    background:radial-gradient(circle at 50% 30%,#3a2a17,#140d06 80%);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
  }
  /* 9:16-Rahmen: füllt immer die volle Bildschirmhöhe, außer die Breite reicht nicht (dann breitenbegrenzt) */
  .frame{
    height:100vh;                       /* Fallback */
    height:min(100dvh, 100vw * 16 / 9);
    aspect-ratio:9 / 16;
    width:auto;
    max-width:100vw;
    border:3px solid #241608;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 18px 50px rgba(0,0,0,.6);
    background:#2c1d0f;
    position:relative;
  }
  .frame iframe{
    display:block;
    width:100%;
    height:100%;
    border:0;
  }
</style>
</head>
<body>
  <div class="frame">
    <iframe id="game" title="Kartenschach" allow="fullscreen"></iframe>
  </div>
  <script>/* Cache-Buster: iframe lädt index.html immer frisch (sonst zeigt er alte Versionen) */
    document.getElementById('game').src='index.html?v='+Date.now();</script>
</body>
</html>
